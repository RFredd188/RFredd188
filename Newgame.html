<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newgame</title>
    <style>
        #startButton {
            position: absolute;
            top: 100px;
            left: 100px;
         border-color: rgb(0, 255, 255);
         border-radius: 10px;
        }
    </style>
</head>
<body>
    <button id="startButton" onmouseover="moveButton()">click here to start the game</button>
</body>

<script> 
    function moveButton() {
       var button=document.getElementById("startButton"); 
       var width= window.innerWidth;
       var height= window.innerHeight;

       //get a random position in the width
       width = Math.random() * width;
       height = Math.random() * height;
button.style.left=width + "px";
button.style.top=height + "px";

    }
</script>

</html>
